<mat-card class="post-card">

    <mat-card-header>
        <mat-card-title class="post-title">
            {{ post.title }}
        </mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <p>
            {{ post.body }}
        </p>
    </mat-card-content>

    <mat-card-actions align="end">
        <button mat-raised-button color="primary">Edit</button>
        <button mat-raised-button color="warn">Remove</button>
    </mat-card-actions>

</mat-card>
