<mat-card class="post-card mt-2 h-100">
    <mat-card-header>
        <mat-card-title class="title-ellipsis">
            <h4 class="mb-2">
                {{ post.title }}
            </h4>
        </mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <p>
            {{ post.body }}
        </p>
    </mat-card-content>

    <mat-card-actions class="d-flex justify-content-between">
        <button mat-raised-button color="primary">Edit</button>
        <button mat-raised-button color="warn">Remove</button>
    </mat-card-actions>
</mat-card>
