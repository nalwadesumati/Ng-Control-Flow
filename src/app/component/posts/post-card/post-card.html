<div class="card h-100 mt-2">
    <div class="card-header">
        <h4 class="post-title ">
            {{post.title}}
        </h4>
    </div>
    <div class="card-body">
        <p>
            {{post.body}}
        </p>
    </div>
    <div class="card-footer d-flex justify-content-between ">
        <button class="btn btn-primary mr-3">Edit</button>
        <button class="btn btn-danger">Remove</button>

    </div>
</div>
